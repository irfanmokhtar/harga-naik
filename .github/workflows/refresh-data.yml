name: Refresh PriceCatcher data
# Registered manually via git push after the initial import predated the workflow OAuth scope.

on:
  schedule:
    # 22:00 UTC = 06:00 MYT — after KPDN's overnight publish window
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install duckdb pandas

      - name: Ingest PriceCatcher data
        run: python3 ingest/ingest.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Rebuild per-shop index
        run: npm run shops

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: refresh PriceCatcher data $(date -u +%Y-%m-%d)"
          git push
